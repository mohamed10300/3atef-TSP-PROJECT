services:
  - type: web
    name: 3atef-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 3atef-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: openai/gpt-4o
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SCRAPER_HEADLESS
        value: "true"

databases:
  - name: 3atef-db
    databaseName: 3atef_db
    user: 3atef
    plan: free
