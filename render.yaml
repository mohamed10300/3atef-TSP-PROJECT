services:
  - type: web
    name: 3atef-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && python -m playwright install chromium
    startCommand: python -m uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 3atef-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: openai/gpt-4o
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://3atef-tsp-project-88iw-o07wee4lk-maqsoud-s-projects.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://3atef-tsp-project-88iw-o07wee4lk-maqsoud-s-projects.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: SCRAPER_HEADLESS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: 3atef-db
    databaseName: 3atef_db
    user: 3atef
    plan: free
